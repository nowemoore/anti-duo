name: Deploy demo to GitHub Pages

# Builds the no-backend static demo (npm run build:static) at the site root, and the native-UI Expo
# PWA (npm run build:web) into an /app sub-folder, then publishes both to GitHub Pages:
#   /<repo>/      → the browser demo
#   /<repo>/app/  → the installable offline PWA
# The cloned repo + Express backend are unaffected — this only deploys the browser-only builds.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish (don't cancel a live deployment).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Build static demo
        run: npm run build:static
        env:
          # Serve under https://<owner>.github.io/<repo>/ — matches the repo name automatically.
          BASE_PATH: /${{ github.event.repository.name }}/
      - name: Build Expo PWA into /app
        working-directory: mobile
        run: |
          npm ci
          npm run build:web -- --output-dir ../dist/app
        env:
          # Serve the PWA from https://<owner>.github.io/<repo>/app/ (sub-path of the demo).
          EXPO_WEB_BASE_URL: /${{ github.event.repository.name }}/app
          # Supabase keys come from repo secrets, not the codebase. Add them under
          # Settings → Secrets and variables → Actions. If unset, the PWA still deploys but runs
          # offline-only (no cloud sync).
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
